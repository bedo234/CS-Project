<!doctype html>
<html>
  <head>
    <title>Your Phone</title>
    <style>
      body {
        background-color: #1a3c5a;
      }
      .storeheader {
        color: white;
        font-size: 45px;
        padding: 20px;
        text-align: center;
      }
      label {
        font-weight: bold;
      }
      .button {
        background-color: gray;
        color: aliceblue;
        border: none;
        border-radius: 5px;
        padding: 10px 25px;
      }
    </style>
  </head>
  <body>
    <h1 class="storeheader">Your Phone</h1>
    <div
      style="
        background-color: aliceblue;
        width: 30%;
        height: auto;
        margin: 0 auto;
        padding: 18px;
        margin-bottom: 50px;
        border-radius: 5px;
      "
    >
      <br />
      <h1
        title="Please fill in details below"
        style="
          font-family: Arial, sans-serif;
          text-align: center;
          color: #1a3c5a;
        "
      >
        Sign up
      </h1>
      <hr />
      <p></p>
      <form action="page2.html" target="_self">
        <label>First name</label><br />
        <input type="text" name="fname" required />
        <p></p>
        <label>Middle name</label><br />
        <input type="text" name="fname" />
        <p></p>
        <label>Last name</label><br />
        <input type="text" name="fname" required /><br />
        <p></p>
        <label>Password</label><br />
        <input type="password" name="pwd" required /><br />
        <p></p>
        <label>Confirm Password</label><br />
        <input type="password" name="pwd" required /><br />
        <p></p>
        <label>Your Favourite Brand:</label><br />
        <input type="radio" name="fav-brand" value="samsung" />
        <label for="samsung">Samsung</label>
        <input type="radio" name="fav-brand" value="iphone" />
        <label for="iphone">Iphone</label>
        <input type="radio" name="fav-brand" value="oppo" />
        <label for="oppo">Oppo</label><br />
        <p></p>
        <label>Color:</label><br />
        <input type="checkbox" name="color1" value="Blue" />
        <label for="Blue">Blue</label>
        <input type="checkbox" name="color1" value="White" />
        <label for="White">White</label>
        <input type="checkbox" name="color3" value="Orannge" />
        <label for="Orannge">Orannge</label><br />
        <p></p>
        <input type="submit" value="Submit" /><br />
        <p></p>
        <input type="reset" value="Reset" /><br />
        <p></p>
      </form>
      <p></p>
      <hr />
      <p></p>
      <span style="display: flex; justify-content: center"
        ><a href="page3.html" target="_blank"
          ><button class="button">Page 3</button></a
        ></span
      >
      <p></p>
      <span style="display: flex; justify-content: center"
        ><a href="page4.html" target="_blank"
          ><button class="button">Page 4</button></a
        ></span
      >
    </div>
  </body>
</html>
